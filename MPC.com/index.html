<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Podcast Company</title>

<style>

/* GLOBAL */
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Helvetica, Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 40px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  z-index: 10;
}

nav a {
  color: #fff;
  margin-right: 30px;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.7;
}

nav a:hover {
  opacity: 1;
}

/* HERO */
.hero {
  text-align: center;
  padding-top: 140px;
}

h1 {
  font-size: 56px;
  letter-spacing: -1px;
}

.subtitle {
  margin-top: 30px;
  font-size: 18px;
  opacity: 0.6;
}

/* LOGO SECTION */
.logo-section {
  margin-top: 80px;
  position: relative;
  overflow: hidden;
}

/* FADE */
.logo-section::before,
.logo-section::after {
  content: "";
  position: absolute;
  top: 0;
  width: 140px;
  height: 100%;
  z-index: 2;
}

.logo-section::before {
  left: 0;
  background: linear-gradient(to right, #000, transparent);
}

.logo-section::after {
  right: 0;
  background: linear-gradient(to left, #000, transparent);
}

/* TRACK */
.logo-track {
  display: flex;
  width: max-content;
  animation: scroll 35s linear infinite;
}

.logo-track:hover {
  animation-play-state: paused;
}

/* LOGOS */
.logo {
  height: 50px;
  margin: 0 60px;
  filter: grayscale(100%) brightness(0) invert(1);
  transition: all 0.3s ease;
}

/* vrais clients */
.logo.real {
  opacity: 0.85;
}

/* aspiration */
.logo.future {
  opacity: 0.35;
}

.logo:hover {
  opacity: 1;
  transform: scale(1.1);
}

/* ANIMATION */
@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* SECTIONS */
section {
  height: 100vh;
  padding: 120px 40px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#home">Home</a>
  <a href="#clients">Clients</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<section id="home" class="hero">
  <h1>My Podcast Company</h1>
  <div class="subtitle">
    Ils ont choisi My Podcast Company
  </div>

  <div class="logo-section">
    <div class="logo-track">

      <!-- REAL -->
      <img class="logo real" src="https://upload.wikimedia.org/wikipedia/commons/5/5f/France_Inter_logo_2018.svg">
      <img class="logo real" src="https://upload.wikimedia.org/wikipedia/commons/8/8a/France_Culture_logo_2018.svg">
      <img class="logo real" src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Arte_logo.svg">
      <img class="logo real" src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Radio_France_logo_2018.svg">

      <!-- FUTURE -->
      <img class="logo future" src="https://upload.wikimedia.org/wikipedia/commons/4/4e/The_New_York_Times_logo.svg">
      <img class="logo future" src="https://upload.wikimedia.org/wikipedia/commons/6/67/NPR_logo.svg">
      <img class="logo future" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Spotify_logo_with_text.svg">
      <img class="logo future" src="https://upload.wikimedia.org/wikipedia/commons/1/19/Apple_Podcasts_logo.svg">

      <!-- DUPLICATE -->
      <img class="logo real" src="https://upload.wikimedia.org/wikipedia/commons/5/5f/France_Inter_logo_2018.svg">
      <img class="logo real" src="https://upload.wikimedia.org/wikipedia/commons/8/8a/France_Culture_logo_2018.svg">
      <img class="logo real" src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Arte_logo.svg">
      <img class="logo real" src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Radio_France_logo_2018.svg">

      <img class="logo future" src="https://upload.wikimedia.org/wikipedia/commons/4/4e/The_New_York_Times_logo.svg">
      <img class="logo future" src="https://upload.wikimedia.org/wikipedia/commons/6/67/NPR_logo.svg">
      <img class="logo future" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Spotify_logo_with_text.svg">
      <img class="logo future" src="https://upload.wikimedia.org/wikipedia/commons/1/19/Apple_Podcasts_logo.svg">

    </div>
  </div>
</section>

<section id="clients">
  <h2>Clients</h2>
</section>

<section id="contact">
  <h2>Contact</h2>
</section>

</body>
</html>
