    <style>
        :root {
            --primary-color: #000000;
            --accent-color: #ff3b30;
            --text-main: #1d1d1f;
            --bg-light: #f5f5f7;
            --font-main: 'Neue Haas Grotesk Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            color: var(--text-main);
            background-color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        /* --- SECTION LOGOS --- */
        .trust-section {
            padding: 80px 0;
            background-color: #fff;
            overflow: hidden;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .trust-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 50px;
            color: #888;
        }

        /* Le conteneur qui masque ce qui dépasse */
        .marquee {
            position: relative;
            width: 100vw;
            max-width: 100%;
            overflow-x: hidden;
            display: flex;
        }

        /* Le rail qui bouge */
        .marquee-track {
            display: flex;
            align-items: center;
            width: max-content;
            animation: scroll-left 50s linear infinite;
        }

        .marquee-track:hover {
            animation-play-state: paused;
        }

        .logo-item {
            flex: 0 0 auto;
            width: 180px;
            height: 80px;
            margin: 0 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-item img {
            max-width: 100%;
            max-height: 50px;
            object-fit: contain;
            filter: grayscale(100%);
            opacity: 0.6;
            transition: all 0.4s ease;
        }

        .logo-item img:hover {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.05);
        }

        /* Animation fluide */
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } /* On défile exactement la moitié (la copie) */
        }

        /* Responsive */
        @media (max-width: 768px) {
            .trust-title { font-size: 1rem; }
            .logo-item { width: 130px; margin: 0 20px; }
            .marquee-track { animation-duration: 35s; }
        }
    </style>
</head>
